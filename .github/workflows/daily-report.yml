name: Daily Japan Market Report

on:
  schedule:
    # Run at 16:00 JST (07:00 UTC) every weekday — after market close
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Daily Report
        env:
          TRANSCODE_API_KEY: ${{ secrets.TRANSCODE_API_KEY }}
          TRANSCODE_API_URL: https://japan-intelligence-api.onrender.com
          OUTPUT_DIR: ./daily
        run: python3 generate_daily_report.py

      - name: Commit and Push
        run: |
          git config user.name "TRANSCODE Bot"
          git config user.email "bot@transcode.sh"
          git add daily/
          git diff --cached --quiet || git commit -m "📊 Daily report: $(date +%Y-%m-%d)"
          git push
